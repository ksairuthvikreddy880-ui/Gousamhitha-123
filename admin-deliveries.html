<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deliveries - Gousamhitha Admin</title>
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/admin-responsive.css">
    <link rel="stylesheet" href="css/admin-scrolling-fix.css">
    <link rel="stylesheet" href="css/admin-mobile-alignment-fix.css">
    <link rel="stylesheet" href="css/admin-mobile-fix.css">
    <link rel="stylesheet" href="css/admin-emergency-fix.css">
    <link rel="stylesheet" href="css/edit-modal-fix.css">
    <link rel="stylesheet" href="css/admin-mobile-layout-fix.css">
    <link rel="stylesheet" href="css/mobile-table-fullwidth-fix.css">
    
    <script src="js/admin-scroll-emergency.js"></script>
    <script src="js/admin-mobile.js"></script>
    <script src="js/admin-mobile-table-fix.js"></script>
    <script src="js/admin-mobile-layout-fix.js"></script>
    <script src="js/single-click-hamburger-fix.js"></script>
</head>
<body class="admin-page">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>Gousamhitha Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-link">Dashboard</a>
                <a href="admin-products.html" class="nav-link">Products</a>
                <a href="admin-add-product.html" class="nav-link">Add Product</a>
                <a href="admin-vendors.html" class="nav-link">Vendors</a>
                <a href="admin-orders.html" class="nav-link">Orders</a>
                <a href="admin-deliveries.html" class="nav-link active">Deliveries</a>
                <a href="admin-delivery-settings.html" class="nav-link">Delivery Settings</a>
                <a href="admin-payouts.html" class="nav-link">Vendor Payouts</a>
                <a href="#" class="nav-link" onclick="adminLogout()">Logout</a>
            </nav>
        </aside>
        
        <main class="admin-content">
            <div class="content-header">
                <h1>Delivery Management</h1>
            </div>
            
            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Phone</th>
                            <th>Address</th>
                            <th>Items</th>
                            <th>Payment</th>
                            <th>Status</th>
                            <th>Location</th>
                        </tr>
                    </thead>
                    <tbody id="deliveries-table-body">
                        
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <!-- Scripts already loaded in head: js/config.js and Supabase CDN -->
    <!-- Scripts -->
    <script src="js/loading-fix-enhanced.js"></script>
    <!-- ✅ SECURE: Removed unsafe admin-script.js - use admin-db.js only -->
    <script src="admin-db.js"></script>
    <script src="js/toast.js"></script>
    
    <script>
        const API_BASE = window.API_BASE_URL || 'https://gousamitha-1-g42x.onrender.com/api';

        function getToken() {
            return localStorage.getItem('token') || localStorage.getItem('auth_token') || '';
        }

        document.addEventListener('DOMContentLoaded', loadDeliveriesTable);

        async function loadDeliveriesTable() {
            const tbody = document.getElementById('deliveries-table-body');
            if (!tbody) return;

            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;">Loading...</td></tr>';

            try {
                const res = await fetch(`${API_BASE}/orders`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const json = await res.json();

                if (!res.ok) throw new Error(json.message || 'Failed to load orders');

                const orders = (json.data && json.data.items) ? json.data.items : [];

                if (!orders.length) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:#666;">No deliveries yet</td></tr>';
                    return;
                }

                const statusColor = { 'Pending':'#ff9800','Packed':'#2196F3','Shipped':'#9c27b0','Delivered':'#4caf50','Cancelled':'#d32f2f' };

                tbody.innerHTML = orders.map(order => {
                    const items = order.order_items || [];
                    const itemsText = items.map(i => `${i.product_name} (${i.quantity})`).join(', ') || 'No items';
                    const shortId = (order.id || '').substring(0, 8).toUpperCase();
                    const address = [order.address, order.city, order.pincode].filter(Boolean).join(', ') || 'No address';
                    const status = order.order_status || order.status || 'Pending';
                    const color = statusColor[status] || '#666';
                    const email = order.email || order.user?.email || 'N/A';
                    const phone = order.phone || order.user?.phone || 'N/A';
                    const isPaid = order.payment_status === 'Paid' || order.payment_status === 'paid';
                    const isCOD = (order.payment_method || '').toUpperCase() === 'COD';
                    const date = order.created_at ? new Date(order.created_at).toLocaleDateString('en-IN') : 'N/A';

                    const paymentBtn = isCOD
                        ? `<button onclick="updatePaymentStatus('${order.id}','${isPaid ? 'Pending' : 'Paid'}')"
                            style="background:${isPaid ? '#4caf50' : '#ff9800'};color:white;padding:0.3rem 0.6rem;border:none;border-radius:4px;cursor:pointer;font-size:0.8rem;margin-top:0.3rem;width:100%;">
                            ${isPaid ? '✓ Paid' : 'Mark Paid'}
                           </button>`
                        : `<span style="color:#4caf50;font-size:0.85rem;">Online Paid</span>`;

                    const locationBtn = (order.latitude && order.longitude)
                        ? `<button onclick="viewLocation(${order.latitude},${order.longitude})" style="background:#2196F3;color:white;padding:0.3rem 0.6rem;border:none;border-radius:4px;cursor:pointer;font-size:0.8rem;">View Map</button>`
                        : '<span style="color:#999;font-size:0.8rem;">No location</span>';

                    return `<tr>
                        <td style="font-family:monospace;font-size:0.85rem;">${shortId}<br><span style="color:#999;font-size:0.75rem;">${date}</span></td>
                        <td><div style="font-weight:600;">${order.customer_name || 'N/A'}</div><div style="font-size:0.8rem;color:#666;">${email}</div></td>
                        <td>${phone}</td>
                        <td style="max-width:200px;font-size:0.85rem;">${address}</td>
                        <td style="max-width:180px;font-size:0.85rem;">${itemsText}<br><span style="color:#666;font-size:0.75rem;">${items.length} item(s)</span></td>
                        <td style="font-weight:600;color:#4a7c59;">
                            ₹${order.total || 0}
                            <div style="font-size:0.75rem;color:#666;">${order.payment_method || 'COD'}</div>
                            ${paymentBtn}
                        </td>
                        <td>
                            <select onchange="updateDeliveryStatus('${order.id}',this.value)"
                                style="padding:0.3rem;border-radius:4px;border:1px solid #ddd;background:${color}15;color:${color};font-weight:600;font-size:0.85rem;">
                                <option value="Pending" ${status==='Pending'?'selected':''}>Pending</option>
                                <option value="Packed" ${status==='Packed'?'selected':''}>Packed</option>
                                <option value="Shipped" ${status==='Shipped'?'selected':''}>Shipped</option>
                                <option value="Delivered" ${status==='Delivered'?'selected':''}>Delivered</option>
                                <option value="Cancelled" ${status==='Cancelled'?'selected':''}>Cancelled</option>
                            </select>
                        </td>
                        <td>${locationBtn}</td>
                    </tr>`;
                }).join('');

            } catch (err) {
                console.error('Deliveries load error:', err);
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:2rem;color:#d32f2f;">Error: ${err.message}</td></tr>`;
            }
        }

        async function updateDeliveryStatus(orderId, newStatus) {
            try {
                const res = await fetch(`${API_BASE}/orders/${orderId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
                    body: JSON.stringify({ status: newStatus })
                });
                if (!res.ok) { const j = await res.json(); throw new Error(j.message); }
                if (typeof showToast === 'function') showToast(`✓ Status updated to ${newStatus}`, 'success');
                await loadDeliveriesTable();
            } catch (err) {
                alert('Failed to update status: ' + err.message);
            }
        }
        window.updateDeliveryStatus = updateDeliveryStatus;

        async function updatePaymentStatus(orderId, newStatus) {
            try {
                const res = await fetch(`${API_BASE}/orders/${orderId}/payment-status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
                    body: JSON.stringify({ payment_status: newStatus })
                });
                if (!res.ok) { const j = await res.json(); throw new Error(j.message); }
                if (typeof showToast === 'function') showToast(`✓ Payment marked as ${newStatus}`, 'success');
                await loadDeliveriesTable();
            } catch (err) {
                alert('Failed to update payment: ' + err.message);
            }
        }
        window.updatePaymentStatus = updatePaymentStatus;

        function viewLocation(lat, lng) {
            window.open(`https://www.google.com/maps?q=${lat},${lng}`, '_blank');
        }
        window.viewLocation = viewLocation;

        function adminLogout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.clear();
                window.location.replace('./index.html');
            }
        }
    </script>
</body>
</html>
