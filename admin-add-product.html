<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Add Product - Gousamhitha Admin</title>
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/admin-responsive.css">
    <link rel="stylesheet" href="css/admin-scrolling-fix.css">
    <link rel="stylesheet" href="css/admin-mobile-alignment-fix.css">
    <link rel="stylesheet" href="css/admin-mobile-fix.css">
    <link rel="stylesheet" href="css/admin-emergency-fix.css">
    <link rel="stylesheet" href="css/edit-modal-fix.css">
    <link rel="stylesheet" href="css/admin-mobile-layout-fix.css">
    <link rel="stylesheet" href="css/mobile-table-fullwidth-fix.css">
    
    <!-- Load Supabase FIRST -->
    <script src="js/supabase-init.js"></script>
    <script src="js/image-compressor.js"></script>
    
    <script src="js/admin-mobile.js"></script>
    <script src="js/admin-mobile-table-fix.js"></script>
    <script src="js/admin-mobile-layout-fix.js"></script>
    <script src="js/single-click-hamburger-fix.js"></script>
</head>
<body class="admin-page">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>Gousamhitha Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-link">Dashboard</a>
                <a href="admin-products.html" class="nav-link">Products</a>
                <a href="admin-add-product.html" class="nav-link active">Add Product</a>
                <a href="admin-vendors.html" class="nav-link">Vendors</a>
                <a href="admin-orders.html" class="nav-link">Orders</a>
                <a href="admin-payouts.html" class="nav-link">Vendor Payouts</a>
                <a href="#" class="nav-link" onclick="adminLogout()">Logout</a>
            </nav>
        </aside>
        
        <main class="admin-content">
            <div class="content-header">
                <h1>Add New Product</h1>
            </div>

            <div style="margin-bottom: 20px;">
                <button type="button" onclick="toggleCategoryManagement()" class="btn-primary" style="padding: 10px 20px;">
                    Manage Categories
                </button>
            </div>

            <div id="category-management-panel" class="category-management-section" style="display: none; background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                <h3 style="margin-bottom: 15px; color: #2e7d32;">Manage Categories</h3>
                
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <input type="text" id="new-category-input" placeholder="Enter new category name" 
                           style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                    <button onclick="addCategory()" class="btn-primary" style="padding: 8px 20px;">Add</button>
                </div>
                
                <div id="categories-list" style="display: flex; flex-wrap: wrap; gap: 10px;">
                    
                </div>
            </div>
            
            <div class="form-container">
                <form id="add-product-form" onsubmit="handleAddProduct(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Product Name *</label>
                            <input type="text" id="product-name" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Select Vendor *</label>
                            <select id="product-vendor" required>
                                <option value="">Select Vendor</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Category *</label>
                            <select id="product-category" required>
                                <option value="">Select Category</option>
                                <option value="Fruits & Vegetables">Fruits & Vegetables</option>
                                <option value="Daily Staples">Daily Staples</option>
                                <option value="Snacks & More">Snacks & More</option>
                                <option value="Bakery & Dairy">Bakery & Dairy</option>
                                <option value="Home Food">Home Food</option>
                                <option value="Special Categories">Special Categories</option>
                                <option value="Conscious Living">Conscious Living</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Subcategory *</label>
                            <input type="text" id="product-subcategory" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Price (?) *</label>
                            <input type="number" id="product-price" required min="0" step="0.01">
                        </div>
                        
                        <div class="form-group">
                            <label>Stock Quantity *</label>
                            <input type="number" id="product-stock" required min="0">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Unit *</label>
                            <select id="product-unit" required>
                                <option value="">Select Unit</option>
                                <option value="kg">Kilogram (kg)</option>
                                <option value="gram">Gram (g)</option>
                                <option value="liter">Liter (L)</option>
                                <option value="ml">Milliliter (ml)</option>
                                <option value="piece">Piece</option>
                                <option value="packet">Packet</option>
                                <option value="box">Box</option>
                                <option value="bottle">Bottle</option>
                                <option value="jar">Jar</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Unit Quantity (e.g., 500 for 500ml) *</label>
                            <input type="number" id="product-unit-quantity" required min="0" step="0.01" placeholder="e.g., 500, 1, 2.5">
                            <small>Enter the quantity per unit (e.g., 500 for 500ml bottle, 1 for 1kg pack)</small>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Product Image</label>
                            <input type="file" id="product-image" accept="image/*" onchange="previewImage(event)">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="product-description" rows="4" placeholder="Enter product description, benefits, ingredients, etc."></textarea>
                    </div>
                    
                    <div class="image-preview" id="image-preview"></div>
                    
                    <div class="form-message" id="form-message"></div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Add Product</button>
                        <a href="admin-dashboard.html" class="btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
    
    <!-- Scripts -->
    <script>
        let categories = [];
        window.imageBase64 = '';

        // Load vendors and categories on DOM ready
        document.addEventListener('DOMContentLoaded', async () => {
            await loadVendors();
            await loadCategories();
        });

        async function loadVendors() {
            const vendorSelect = document.getElementById('product-vendor');
            if (!vendorSelect) return;
            try {
                const token = localStorage.getItem('token') || '';
                const res = await fetch(`${window.API_BASE_URL || 'https://gousamitha-1-g42x.onrender.com/api'}/vendors`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const json = await res.json();
                const vendors = (json.data && json.data.items) || json.vendors || [];
                vendorSelect.innerHTML = '<option value="">Select Vendor</option>' +
                    vendors.map(v => `<option value="${v.id}">${v.vendor_name || v.name} - ${v.business_name || ''}</option>`).join('');
                console.log('✅ Loaded', vendors.length, 'vendors');
            } catch (error) {
                console.error('Error loading vendors:', error);
            }
        }

        async function loadCategories() {
            console.log('✅ Categories loaded from dropdown');
        }

        function toggleCategoryManagement() {
            const panel = document.getElementById('category-management-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            const preview = document.getElementById('image-preview');
            preview.innerHTML = '<div style="padding: 1rem; color: #666;">Compressing image...</div>';
            if (window.ImageCompressor) {
                window.ImageCompressor.compress(file, { maxWidth: 800, maxHeight: 800, quality: 0.8 })
                    .then(b64 => { window.imageBase64 = b64; preview.innerHTML = `<img src="${b64}" alt="Preview" style="max-width:300px;border-radius:8px;margin-top:10px;">`; })
                    .catch(() => { preview.innerHTML = '<div style="padding:1rem;color:#d32f2f;">Failed to compress image</div>'; });
            } else {
                const reader = new FileReader();
                reader.onload = e => { window.imageBase64 = e.target.result; preview.innerHTML = `<img src="${e.target.result}" alt="Preview" style="max-width:300px;border-radius:8px;margin-top:10px;">`; };
                reader.readAsDataURL(file);
            }
        }

        window.handleAddProduct = async function(event) {
            event.preventDefault();
            const name = document.getElementById('product-name').value.trim();
            const category = document.getElementById('product-category').value;
            const subcategory = document.getElementById('product-subcategory').value.trim();
            const price = parseFloat(document.getElementById('product-price').value);
            const stock = parseInt(document.getElementById('product-stock').value);
            const unit = document.getElementById('product-unit').value;
            const unitQuantity = parseFloat(document.getElementById('product-unit-quantity').value);
            const description = document.getElementById('product-description').value.trim();
            const vendorId = document.getElementById('product-vendor')?.value || '';
            const messageEl = document.getElementById('form-message');

            if (!name || !category || !price || !stock || !unit || !unitQuantity) {
                messageEl.textContent = 'Please fill in all required fields';
                messageEl.className = 'form-message error';
                return;
            }

            messageEl.textContent = 'Adding product...';
            messageEl.className = 'form-message';

            const newProduct = {
                name, category,
                subcategory: subcategory || null,
                price, stock, unit,
                unit_quantity: unitQuantity,
                display_unit: unitQuantity + unit,
                image_url: window.imageBase64 || null,
                description: description || null,
                ...(vendorId && vendorId.includes('-') ? { vendor_id: vendorId } : {})
            };

            try {
                const token = localStorage.getItem('token') || '';
                const res = await fetch(`${window.API_BASE_URL || 'https://gousamitha-1-g42x.onrender.com/api'}/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify(newProduct)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || data.error || 'Failed to add product');

                messageEl.textContent = 'Product added successfully! Redirecting...';
                messageEl.className = 'form-message success';
                document.getElementById('add-product-form').reset();
                document.getElementById('image-preview').innerHTML = '';
                window.imageBase64 = '';
                setTimeout(() => { window.location.href = 'admin-products.html'; }, 1500);
            } catch (e) {
                console.error('Error adding product:', e);
                messageEl.textContent = 'Error: ' + e.message;
                messageEl.className = 'form-message error';
            }
        };

        async function adminLogout() {
            if (!confirm('Are you sure you want to logout?')) return;
            try {
                const token = localStorage.getItem('token') || '';
                await fetch(`${window.API_BASE_URL || 'https://gousamitha-1-g42x.onrender.com/api'}/auth/signout`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                }).catch(() => {});
            } finally {
                localStorage.clear();
                window.location.replace('./index.html');
            }
        }
    </script>
    <script src="js/toast.js"></script>
</body>
</html>
