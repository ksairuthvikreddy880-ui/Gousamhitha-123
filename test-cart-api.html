<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Cart API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background: #0056b3;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Cart API Test</h1>
    
    <div class="test-section">
        <h3>User Info</h3>
        <div id="user-info"></div>
    </div>

    <div class="test-section">
        <h3>Test Cart Fetch</h3>
        <button onclick="testGetCart()">Get Cart</button>
        <pre id="cart-result"></pre>
    </div>

    <div class="test-section">
        <h3>Test Add to Cart</h3>
        <input type="text" id="product-id" placeholder="Product ID" value="1">
        <input type="number" id="quantity" placeholder="Quantity" value="1">
        <button onclick="testAddToCart()">Add to Cart</button>
        <pre id="add-result"></pre>
    </div>

    <script>
        const API_BASE = 'https://gousamitha-1-g42x.onrender.com/api';
        
        // Display user info
        function displayUserInfo() {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            const token = localStorage.getItem('token');
            
            const userInfoDiv = document.getElementById('user-info');
            if (user && token) {
                userInfoDiv.innerHTML = `
                    <p class="success">✅ Logged in as: ${user.email}</p>
                    <p>User ID: ${user.id}</p>
                    <p>Token: ${token.substring(0, 20)}...</p>
                `;
            } else {
                userInfoDiv.innerHTML = '<p class="error">❌ Not logged in. Please login first.</p>';
            }
        }

        // Test get cart
        async function testGetCart() {
            const resultDiv = document.getElementById('cart-result');
            resultDiv.textContent = 'Loading...';
            
            try {
                const user = JSON.parse(localStorage.getItem('user') || 'null');
                const token = localStorage.getItem('token');
                
                if (!user || !token) {
                    throw new Error('Not logged in');
                }
                
                console.log('Fetching cart for user:', user.id);
                
                const response = await fetch(`${API_BASE}/cart/${user.id}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                console.log('Cart response:', data);
                
                if (!response.ok) {
                    throw new Error(data.error || `HTTP ${response.status}`);
                }
                
                resultDiv.textContent = JSON.stringify(data, null, 2);
                resultDiv.className = 'success';
                
            } catch (error) {
                console.error('Cart fetch error:', error);
                resultDiv.textContent = `Error: ${error.message}`;
                resultDiv.className = 'error';
            }
        }

        // Test add to cart
        async function testAddToCart() {
            const resultDiv = document.getElementById('add-result');
            resultDiv.textContent = 'Loading...';
            
            try {
                const user = JSON.parse(localStorage.getItem('user') || 'null');
                const token = localStorage.getItem('token');
                
                if (!user || !token) {
                    throw new Error('Not logged in');
                }
                
                const productId = document.getElementById('product-id').value;
                const quantity = parseInt(document.getElementById('quantity').value);
                
                console.log('Adding to cart:', { user_id: user.id, product_id: productId, quantity });
                
                const response = await fetch(`${API_BASE}/cart`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user_id: user.id,
                        product_id: productId,
                        quantity: quantity
                    })
                });
                
                const data = await response.json();
                
                console.log('Add to cart response:', data);
                
                if (!response.ok) {
                    throw new Error(data.error || `HTTP ${response.status}`);
                }
                
                resultDiv.textContent = JSON.stringify(data, null, 2);
                resultDiv.className = 'success';
                
            } catch (error) {
                console.error('Add to cart error:', error);
                resultDiv.textContent = `Error: ${error.message}`;
                resultDiv.className = 'error';
            }
        }

        // Initialize
        displayUserInfo();
    </script>
</body>
</html>
