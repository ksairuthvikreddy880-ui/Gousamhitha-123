<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .status {
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .logged-in {
            background: #e8f5e9;
            border: 2px solid #4caf50;
        }
        .logged-out {
            background: #ffebee;
            border: 2px solid #f44336;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-primary {
            background: #4a7c59;
            color: white;
        }
        .btn-danger {
            background: #d32f2f;
            color: white;
        }
        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Session Test Page</h1>
    
    <div id="status" class="status"></div>
    
    <div>
        <button class="btn-primary" onclick="checkSession()">Check Session</button>
        <button class="btn-primary" onclick="testLogin()">Test Login</button>
        <button class="btn-danger" onclick="clearSession()">Clear Session</button>
        <button class="btn-primary" onclick="window.location.href='index.html'">Go to Home</button>
    </div>
    
    <h2>localStorage Data:</h2>
    <pre id="localStorage-data"></pre>
    
    <h2>Console Log:</h2>
    <pre id="console-log"></pre>
    
    <script src="js/auth-handler.js"></script>
    <script>
        function log(message) {
            const consoleLog = document.getElementById('console-log');
            consoleLog.textContent += message + '\n';
            console.log(message);
        }
        
        function checkSession() {
            log('=== Checking Session ===');
            
            const token = localStorage.getItem('auth_token');
            const userStr = localStorage.getItem('auth_user');
            
            log('Token exists: ' + !!token);
            log('Token value: ' + (token ? token.substring(0, 50) + '...' : 'null'));
            log('User data exists: ' + !!userStr);
            
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    log('User email: ' + user.email);
                    log('User name: ' + (user.full_name || 'N/A'));
                    
                    document.getElementById('status').className = 'status logged-in';
                    document.getElementById('status').innerHTML = `
                        <h2>✅ Logged In</h2>
                        <p><strong>Email:</strong> ${user.email}</p>
                        <p><strong>Name:</strong> ${user.full_name || 'N/A'}</p>
                        <p><strong>ID:</strong> ${user.id}</p>
                    `;
                } catch (e) {
                    log('Error parsing user data: ' + e.message);
                }
            } else {
                document.getElementById('status').className = 'status logged-out';
                document.getElementById('status').innerHTML = `
                    <h2>❌ Not Logged In</h2>
                    <p>No session found in localStorage</p>
                `;
            }
            
            updateLocalStorageDisplay();
        }
        
        function updateLocalStorageDisplay() {
            const data = {
                auth_token: localStorage.getItem('auth_token') ? 
                    localStorage.getItem('auth_token').substring(0, 50) + '...' : null,
                auth_user: localStorage.getItem('auth_user')
            };
            
            document.getElementById('localStorage-data').textContent = 
                JSON.stringify(data, null, 2);
        }
        
        async function testLogin() {
            log('=== Testing Login ===');
            const email = prompt('Enter email:', 'test@example.com');
            const password = prompt('Enter password:');
            
            if (!email || !password) {
                log('Login cancelled');
                return;
            }
            
            try {
                log('Attempting login...');
                const response = await fetch('https://gousamitha-1-g42x.onrender.com/api/auth/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                log('Response status: ' + response.status);
                log('Response data: ' + JSON.stringify(data, null, 2));
                
                if (response.ok && data.session?.access_token) {
                    localStorage.setItem('auth_token', data.session.access_token);
                    localStorage.setItem('auth_user', JSON.stringify(data.user));
                    log('✅ Login successful! Token saved.');
                    checkSession();
                } else {
                    log('❌ Login failed: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                log('❌ Login error: ' + error.message);
            }
        }
        
        function clearSession() {
            log('=== Clearing Session ===');
            localStorage.removeItem('auth_token');
            localStorage.removeItem('auth_user');
            log('✅ Session cleared');
            checkSession();
        }
        
        // Auto-check on load
        window.addEventListener('load', () => {
            log('Page loaded');
            checkSession();
        });
    </script>
</body>
</html>
