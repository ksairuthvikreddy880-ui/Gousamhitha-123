<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vendors - Gousamhitha Admin</title>
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/admin-responsive.css">
    <link rel="stylesheet" href="css/admin-scrolling-fix.css">
    <link rel="stylesheet" href="css/admin-mobile-alignment-fix.css">
    <link rel="stylesheet" href="css/admin-mobile-fix.css">
    <link rel="stylesheet" href="css/admin-emergency-fix.css">
    <link rel="stylesheet" href="css/edit-modal-fix.css">
    <link rel="stylesheet" href="css/admin-mobile-layout-fix.css">
    <link rel="stylesheet" href="css/mobile-table-fullwidth-fix.css">
    <!-- Load config FIRST -->
    <script src="js/config.js"></script>
    <script src="js/admin-scroll-emergency.js"></script>
    <script src="js/admin-mobile.js"></script>
    <script src="js/admin-mobile-table-fix.js"></script>
    <script src="js/admin-mobile-layout-fix.js"></script>
    <script src="js/single-click-hamburger-fix.js"></script>
    <style>
        .vendor-form-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .vendor-form-section h2 {
            margin-bottom: 1.5rem;
            color: #2d3748;
        }
        .form-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        .form-message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .form-message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body class="admin-page">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>Gousamhitha Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-link">Dashboard</a>
                <a href="admin-products.html" class="nav-link">Products</a>
                <a href="admin-add-product.html" class="nav-link">Add Product</a>
                <a href="admin-vendors.html" class="nav-link active">Vendors</a>
                <a href="admin-orders.html" class="nav-link">Orders</a>
                <a href="admin-payouts.html" class="nav-link">Vendor Payouts</a>
                <a href="#" class="nav-link" onclick="adminLogout()">Logout</a>
            </nav>
        </aside>
        
        <main class="admin-content">
            <div class="content-header">
                <h1>Vendor Management</h1>
            </div>
            
            <!-- Add/Edit Vendor Form -->
            <div class="vendor-form-section">
                <h2>Add New Vendor</h2>
                <div id="vendor-message" class="form-message"></div>
                <form id="vendor-form">
                    <div class="form-group">
                        <label>Vendor Name *</label>
                        <input type="text" id="vendor-name" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Business Name *</label>
                        <input type="text" id="business-name" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="vendor-phone">
                    </div>
                    
                    <div class="form-group">
                        <label>Address</label>
                        <textarea id="vendor-address" rows="3"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Status</label>
                        <select id="vendor-status">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Save Vendor</button>
                        <button type="button" class="btn-secondary" onclick="cancelEdit()">Cancel</button>
                    </div>
                </form>
            </div>
            
            <!-- Vendors Table -->
            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Vendor Name</th>
                            <th>Business Name</th>
                            <th>Phone</th>
                            <th>Address</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="vendors-table-body">
                        <tr><td colspan="6" style="text-align: center; padding: 2rem;">Loading vendors...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/admin-api-client.js"></script>
    <script src="js/admin-vendors-handler.js"></script>
</body>
</html>
