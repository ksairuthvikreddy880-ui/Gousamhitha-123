<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vendor Payouts - Gousamhitha Admin</title>
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/admin-responsive.css">
    <link rel="stylesheet" href="css/admin-scrolling-fix.css">
    <link rel="stylesheet" href="css/admin-mobile-alignment-fix.css">
    <link rel="stylesheet" href="css/admin-mobile-fix.css">
    <link rel="stylesheet" href="css/admin-emergency-fix.css">
    <link rel="stylesheet" href="css/edit-modal-fix.css">
    <link rel="stylesheet" href="css/admin-mobile-layout-fix.css">
    <link rel="stylesheet" href="css/mobile-table-fullwidth-fix.css">
    <script src="js/admin-mobile.js"></script>
    <script src="js/admin-mobile-table-fix.js"></script>
    <script src="js/admin-mobile-layout-fix.js"></script>
    <script src="js/single-click-hamburger-fix.js"></script>
    <link rel="stylesheet" href="css/loader.css">
</head>
<body class="admin-page">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>Gousamhitha Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-link">Dashboard</a>
                <a href="admin-products.html" class="nav-link">Products</a>
                <a href="admin-add-product.html" class="nav-link">Add Product</a>
                <a href="admin-vendors.html" class="nav-link">Vendors</a>
                <a href="admin-orders.html" class="nav-link">Orders</a>
                <a href="admin-payouts.html" class="nav-link active">Vendor Payouts</a>
                <a href="#" class="nav-link" onclick="adminLogout()">Logout</a>
            </nav>
        </aside>
        
        <main class="admin-content">
            <div class="content-header">
                <h1>Vendor Payouts</h1>
            </div>
            
            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Vendor</th>
                            <th>Order ID</th>
                            <th>Gross Amount</th>
                            <th>Commission (10%)</th>
                            <th>Net Amount</th>
                            <th>Status</th>
                            <th>Payout Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="payouts-table-body">
                        
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <!-- Scripts already loaded in head: js/config.js and Supabase CDN -->
    <script src="js/auth-handler.js"></script>
    <script src="js/loading-fix-enhanced.js"></script>
    <!-- ✅ SECURE: Removed unsafe admin-script.js - use admin-db.js only -->
    <script src="admin-db.js"></script>
    <script>
        async function loadPayoutsTable() {
            const tbody = document.getElementById('payouts-table-body');
            if (!tbody) return;
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;">Loading payouts...</td></tr>';

            try {
                const token = localStorage.getItem('token') || '';
                const res = await fetch(`${window.API_BASE_URL || 'https://gousamhitha-123.onrender.com/api'}/payouts`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const json = await res.json();
                if (!res.ok) throw new Error(json.message || json.error || 'Failed to load payouts');

                const payouts = (json.data && json.data.items) || json.payouts || [];

                if (!payouts.length) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;">No payouts found. Payouts will appear here after orders are placed.</td></tr>';
                    return;
                }

                tbody.innerHTML = payouts.map(payout => {
                    const vendorName = payout.vendors ? payout.vendors.business_name : 'Unknown Vendor';
                    const statusClass = payout.payout_status === 'paid' ? 'status-completed' : 'status-pending';
                    const statusText = payout.payout_status === 'paid' ? 'Paid' : 'Pending';
                    const payoutDate = payout.payout_date ? new Date(payout.payout_date).toLocaleDateString() : '-';
                    const shortOrderId = payout.order_id ? payout.order_id.substring(0, 8) : '-';
                    const action = payout.payout_status === 'pending'
                        ? `<button class="btn btn-primary btn-sm" onclick="markAsPaid('${payout.id}')">Mark as Paid</button>`
                        : '<span style="color:#4caf50;">Paid</span>';
                    return `<tr>
                        <td>${vendorName}</td>
                        <td>${shortOrderId}</td>
                        <td>₹${parseFloat(payout.gross_amount).toFixed(2)}</td>
                        <td>₹${parseFloat(payout.commission_amount).toFixed(2)}</td>
                        <td><strong>₹${parseFloat(payout.net_amount).toFixed(2)}</strong></td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>${payoutDate}</td>
                        <td>${action}</td>
                    </tr>`;
                }).join('');
            } catch (error) {
                console.error('Error loading payouts:', error);
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:2rem;color:red;">Error: ${error.message}<br><small>Please ensure the vendor_payouts table exists</small></td></tr>`;
            }
        }

        async function markAsPaid(payoutId) {
            if (!confirm('Mark this payout as paid?')) return;
            try {
                const token = localStorage.getItem('token') || '';
                const res = await fetch(`${window.API_BASE_URL || 'https://gousamhitha-123.onrender.com/api'}/payouts/${payoutId}/pay`, {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
                });
                const json = await res.json();
                if (!res.ok) throw new Error(json.message || json.error || 'Failed to update payout');
                if (typeof showToast === 'function') showToast('Payout marked as paid successfully!');
                await loadPayoutsTable();
            } catch (error) {
                console.error('Error marking payout as paid:', error);
                if (typeof showToast === 'function') showToast('Failed to update payout status', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await checkAdminAuth();
            await loadPayoutsTable();
        });
    </script>
    <script src="js/toast.js"></script>
    <script src="js/loader.js"></script>
</body>
</html>
